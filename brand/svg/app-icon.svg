<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="speech-logger app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B60D8"/>
      <stop offset="1" stop-color="#3C41B0"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>
  <!-- macOS squircle plate with padding -->
  <g filter="url(#sh)">
    <rect x="102" y="102" width="820" height="820" rx="184" fill="url(#bg)"/>
    <rect x="102" y="102" width="820" height="820" rx="184" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
  </g>
  <!-- the mark, white, centered -->
  <g transform="translate(166.4,166.4) scale(7.2)" fill="none" stroke="#ffffff">
    <rect x="34" y="16" width="28" height="50" rx="14" stroke-width="4.5"/>
    <g stroke-width="4" stroke-linecap="round">
      <line x1="41" y1="30" x2="55" y2="30"/>
      <line x1="41" y1="40" x2="55" y2="40"/>
      <line x1="41" y1="50" x2="50" y2="50"/>
    </g>
    <path d="M26 46a22 22 0 0 0 44 0" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="48" y1="68" x2="48" y2="80" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="39" y1="80" x2="57" y2="80" stroke-width="4.5" stroke-linecap="round"/>
  </g>
</svg>
