<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" fill="none" style="color:#171922" role="img" aria-label="speech-logger">
  <!-- microphone capsule -->
  <rect x="34" y="16" width="28" height="50" rx="14" stroke="currentColor" stroke-width="4.5"/>
  <!-- three organized text lines -->
  <g stroke="currentColor" stroke-width="4" stroke-linecap="round">
    <line x1="41" y1="30" x2="55" y2="30"/>
    <line x1="41" y1="40" x2="55" y2="40"/>
    <line x1="41" y1="50" x2="50" y2="50"/>
  </g>
  <!-- stand: holder arc, stem, base -->
  <path d="M26 46a22 22 0 0 0 44 0" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="48" y1="68" x2="48" y2="80" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="39" y1="80" x2="57" y2="80" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
</svg>
